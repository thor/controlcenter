---
# This workflow is used to release control-center. It runs an action that
# determines whether it needs to create a release or create a PR which
# contains a list of changes for the next release.
name: Release (release-please)

on:
  push:
    branches:
      - main
      - ci/release-please

  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || (!contains(github.ref_name, '-beta.') && !contains(github.ref_name, '-rc.') && !contains(github.ref_name, '-alpha.')) }}
    steps:
      - uses: googleapis/release-please-action@v5
        with:
          token: ${{ secrets.VATSCA_BOT_TOKEN }}
